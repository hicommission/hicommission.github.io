<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn FAST – Pro Looper</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f7;
      color: #111;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 16px 20px 24px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
    }
    h1 {
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 12px;
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 12px;
    }
    button {
      padding: 8px 12px;
      font-size: 14px;
      border-radius: 999px;
      border: 1px solid #007aff;
      background: #007aff;
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    button.secondary { background: #fff; color: #007aff; }
    button:disabled { opacity: 0.5; cursor: default; }
    .status {
      font-size: 12px;
      color: #555;
      margin-bottom: 10px;
    }
    #player {
    width: 100%;
    height: auto;
    max-height: 360px; /* cap size */
    aspect-ratio: 16 / 9;
    margin: 0 auto 16px;
    background: #000;
    position: relative;
    overflow: hidden;
    }
    .loop-controls {
      margin-top: 10px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }
    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }
    .slider-row span { font-size: 12px; }
    input[type="range"] { width: 100%; }
    .loop-label {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .loop-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
    }
    .loop-indicator.on { background: #34c759; }

    /* Photo Moments — in-page snapshot button. Hidden unless the
       VideoOrganizer iOS app's WKWebView injects the bridge
       (window.webkit.messageHandlers.snapshot). Desktop browsers
       and other embedders never see it. */
    #snapshotBtn {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      border-radius: 22px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.35);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      padding: 0;
      gap: 0;
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
      transition: background 120ms ease, transform 120ms ease;
    }
    #snapshotBtn:active {
      background: rgba(255, 255, 255, 0.85);
      color: #000;
      transform: scale(0.92);
    }
    #snapshotFlash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 9;
      transition: opacity 80ms ease-out;
    }
  </style>
</head>
<body>
  <!-- Photo Moments — in-page snapshot trigger. Fires
       webkit.messageHandlers.snapshot.postMessage({}) which the
       VideoOrganizer iOS app handles via SnapshotMessageProxy in
       VideoPlayerView.swift. -->
  <button id="snapshotBtn" aria-label="Capture moment" title="Capture moment">📸</button>
  <div id="snapshotFlash"></div>
  <div class="container">
    <h1>Learn FAST – Pro Looper</h1>

    <div class="button-row">
      <button id="playBtn" disabled>▶ Play</button>
      <button id="loopBtn" class="secondary" disabled>🔁 Loop OFF</button>
    </div>

    <div class="status" id="statusText">Initializing…</div>
    <div id="player"></div>

    <div class="loop-controls">
      <div class="slider-row">
        <span>Loop start (seconds): <span id="startLabel">0.0</span></span>
        <input id="startSlider" type="range" min="0" max="100" step="0.1" value="0" />
      </div>
      <div class="slider-row">
        <span>Loop end (seconds): <span id="endLabel">0.0</span></span>
        <input id="endSlider" type="range" min="0" max="100" step="0.1" value="10" />
      </div>
      <div class="loop-label">
        <div id="loopIndicator" class="loop-indicator"></div>
        <span id="loopInfo">Loop: disabled</span>
      </div>
    </div>
  </div>

  <script
  src="https://www.youtube.com/iframe_api"
  allow="autoplay"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const initialVideoId = params.get("video") || "";
    // Optional resume offset (seconds). Set by VideoOrganizer when
    // the user taps a Photo Moment bookmark — see VideoPlayerView's
    // `seekTo` param.
    const initialSeek = parseFloat(params.get("t") || "") || 0;
    let player = null;
    let playerReady = false;
    let loopEnabled = false;
    let loopStart = 0;
    let loopEnd = 10;
    let duration = 0;

    const playBtn = document.getElementById('playBtn');
    const loopBtn = document.getElementById('loopBtn');
    const statusText = document.getElementById('statusText');
    const startSlider = document.getElementById('startSlider');
    const endSlider = document.getElementById('endSlider');
    const startLabel = document.getElementById('startLabel');
    const endLabel = document.getElementById('endLabel');
    const loopIndicator = document.getElementById('loopIndicator');
    const loopInfo = document.getElementById('loopInfo');

    function updateLoopUI() {
      loopBtn.textContent = loopEnabled ? "🔁 Loop ON" : "🔁 Loop OFF";
      loopIndicator.classList.toggle("on", loopEnabled);
      loopInfo.textContent = loopEnabled
        ? `Loop: start=${loopStart.toFixed(1)}s • end=${loopEnd.toFixed(1)}s`
        : "Loop: disabled";
    }

    playBtn.onclick = () => {
      if (loopEnabled) player.seekTo(loopStart);
      player.playVideo();
    };

    loopBtn.onclick = () => {
      loopEnabled = !loopEnabled;
      updateLoopUI();
    };

    startSlider.oninput = () => {
      loopStart = Math.min(parseFloat(startSlider.value), loopEnd - 0.1);
      startLabel.textContent = loopStart.toFixed(1);
      updateLoopUI();
    };

    endSlider.oninput = () => {
      loopEnd = Math.max(parseFloat(endSlider.value), loopStart + 0.1);
      endLabel.textContent = loopEnd.toFixed(1);
      updateLoopUI();
    };

    window.onYouTubeIframeAPIReady = () => {
      player = new YT.Player('player', {
        height: '360',
        width: '640',
        videoId: "",
        playerVars: {
        'origin': window.location.origin,
        'playsinline': 1,
        'rel': 0,
        'fs': 0      // ⛔ Disable fullscreen mode
        },
        events: {
          onReady: () => {
            playerReady = true;
            playBtn.disabled = loopBtn.disabled = false;
            if (initialVideoId.length > 0) {
               // If we have a resume offset (Photo Moment bookmark),
               // load + seek atomically via loadVideoById's startSeconds
               // arg. Without this, loadVideoById would land at 0 and
               // a subsequent seekTo would only fire once the player
               // had buffered enough — ugly user-visible jump.
               if (initialSeek > 0) {
                 player.loadVideoById({
                   videoId: initialVideoId,
                   startSeconds: initialSeek
                 });
               } else {
                 player.loadVideoById(initialVideoId);
               }
               statusText.textContent = "Video loaded: " + initialVideoId
                 + (initialSeek > 0 ? "  (resumed @ " + initialSeek + "s)" : "");
               //player.mute();      // Allow autoplay
               //player.playVideo(); // Start playback immediately
                //player.mute(); // required for silent auto-play
                player.playVideo();

                // Backup in case iOS still blocks
                setTimeout(() => {
                if (player.getPlayerState() !== YT.PlayerState.PLAYING) {
                    player.playVideo();
                }
                }, 300);
            }else {
              statusText.textContent = "No video provided.";
            }
          },
          onStateChange: (e) => {
            if (e.data === YT.PlayerState.PLAYING) {
              duration = player.getDuration();
              startSlider.max = endSlider.max = duration;
            }
          }
        }
      });

      setInterval(() => {
        if (playerReady && loopEnabled && player.getPlayerState() === YT.PlayerState.PLAYING) {
          if (player.getCurrentTime() >= loopEnd) player.seekTo(loopStart);
        }
      }, 200);
    };

    // Photo Moments — show the snapshot button ONLY when running
    // inside VideoOrganizer's WKWebView (i.e. when the snapshot
    // bridge is injected). Desktop browsers and other embedders
    // never see the button.
    (function setupSnapshotButton() {
      var hasBridge = window.webkit
        && window.webkit.messageHandlers
        && window.webkit.messageHandlers.snapshot;
      if (!hasBridge) return;

      var btn = document.getElementById('snapshotBtn');
      var flash = document.getElementById('snapshotFlash');
      if (!btn) return;
      btn.style.display = 'flex';

      btn.addEventListener('click', function() {
        // Brief white flash for visual feedback — the iOS side
        // handles the actual snapshot asynchronously, so without
        // this the user gets no confirmation that the tap
        // registered.
        if (flash) {
          flash.style.opacity = '0.55';
          setTimeout(function() { flash.style.opacity = '0'; }, 90);
        }
        // Send the current playback time so the iOS side can store
        // a bookmark (thumbnail + offset) and seek back here when
        // the user taps this moment in the carousel. We can't ship
        // actual video pixels — iOS blocks frame capture for
        // YouTube content (AVPlayer protected output) — so the
        // bookmark approach is the workable substitute.
        // `player` is the closure-scoped YT.Player instance declared
        // up at module scope. It's the same variable the Play/Loop
        // buttons use; reading getCurrentTime() here is safe once
        // playerReady is true (set in onReady).
        var payload = {};
        try {
          if (playerReady && player && typeof player.getCurrentTime === 'function') {
            var t = player.getCurrentTime();
            if (typeof t === 'number' && isFinite(t) && t >= 0) {
              payload.time = t;
            }
          }
        } catch (e) { /* player not yet ready — payload stays empty */ }
        try {
          window.webkit.messageHandlers.snapshot.postMessage(payload);
        } catch (e) {
          console.error('snapshot bridge failed:', e);
        }
      });
    })();
  </script>
</body>
</html>
